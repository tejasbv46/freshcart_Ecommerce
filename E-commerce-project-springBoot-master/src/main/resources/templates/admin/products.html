<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta th:replace="~{layout :: head('Manage Products | FreshCart')}">
</head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main class="container py-4 my-3">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-lg-3">
                <div class="card card-custom p-4">
                    <h5 class="fw-bold mb-4"><i class="fa-solid fa-gauge text-danger me-2"></i>Admin Panel</h5>
                    <div class="nav flex-column nav-pills gap-2 text-start">
                        <a href="/admin/Dashboard" class="nav-link rounded-pill px-4 py-2.5 text-secondary"><i class="fa-solid fa-chart-pie me-2"></i>Dashboard</a>
                        <a href="/admin/products" class="nav-link active rounded-pill px-4 py-2.5"><i class="fa-solid fa-box-open me-2"></i>Products</a>
                        <a href="/admin/categories" class="nav-link rounded-pill px-4 py-2.5 text-secondary"><i class="fa-solid fa-folder-open me-2"></i>Categories</a>
                        <a href="/admin/customers" class="nav-link rounded-pill px-4 py-2.5 text-secondary"><i class="fa-solid fa-users me-2"></i>Customers</a>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold mb-0">Products Catalog</h3>
                    <a href="/admin/products/add" class="btn btn-gradient-primary rounded-pill px-4"><i class="fa-solid fa-plus me-2"></i>Add Product</a>
                </div>

                <!-- Products Table -->
                <div class="card card-custom p-4">
                    <div class="table-responsive small">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Image</th>
                                    <th>Product Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Stock Status</th>
                                    <th class="text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="prod : ${products}">
                                    <td>
                                        <img th:src="${prod.image}" class="img-fluid rounded" alt="Product Image" style="max-height: 40px; width: 40px; object-fit: contain;">
                                    </td>
                                    <td class="fw-bold" th:text="${prod.name}">Apple</td>
                                    <td th:text="${prod.category != null ? prod.category.name : 'Uncategorized'}">Fruits</td>
                                    <td class="fw-bold text-primary" th:text="${'$' + prod.price}">$3.00</td>
                                    <td th:text="${prod.quantity}">40</td>
                                    <td>
                                        <span class="badge" th:classappend="${prod.quantity > 0 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'}" th:text="${prod.quantity > 0 ? 'IN STOCK' : 'OUT OF STOCK'}">IN STOCK</span>
                                    </td>
                                    <td class="text-center">
                                        <div class="d-flex justify-content-center gap-2">
                                            <a th:href="@{/admin/products/update/{id}(id=${prod.id})}" class="btn btn-outline-secondary btn-sm rounded-circle p-2" style="width: 32px; height: 32px; line-height: 16px;"><i class="fa-solid fa-pen-to-square"></i></a>
                                            <form action="/admin/products/delete" method="post" onsubmit="return confirm('Are you sure you want to delete this product?');" class="d-inline">
                                                <input type="hidden" name="id" th:value="${prod.id}">
                                                <button type="submit" class="btn btn-outline-danger btn-sm rounded-circle p-2" style="width: 32px; height: 32px; line-height: 16px;"><i class="fa-solid fa-trash"></i></button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(products)}">
                                    <td colspan="7" class="text-center py-4 text-secondary">No products are currently available in the catalog.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
</body>
</html>
