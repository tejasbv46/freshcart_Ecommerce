<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta th:replace="~{layout :: head('Manage Categories | FreshCart')}">
</head>
<body>
    <header th:replace="~{layout :: header}"></header>

    <main class="container py-4 my-3">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-lg-3">
                <div class="card card-custom p-4">
                    <h5 class="fw-bold mb-4"><i class="fa-solid fa-gauge text-danger me-2"></i>Admin Panel</h5>
                    <div class="nav flex-column nav-pills gap-2 text-start">
                        <a href="/admin/Dashboard" class="nav-link rounded-pill px-4 py-2.5 text-secondary"><i class="fa-solid fa-chart-pie me-2"></i>Dashboard</a>
                        <a href="/admin/products" class="nav-link rounded-pill px-4 py-2.5 text-secondary"><i class="fa-solid fa-box-open me-2"></i>Products</a>
                        <a href="/admin/categories" class="nav-link active rounded-pill px-4 py-2.5"><i class="fa-solid fa-folder-open me-2"></i>Categories</a>
                        <a href="/admin/customers" class="nav-link rounded-pill px-4 py-2.5 text-secondary"><i class="fa-solid fa-users me-2"></i>Customers</a>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="col-lg-9">
                <h3 class="fw-bold mb-4">Categories Management</h3>

                <div class="row g-4">
                    <!-- Left: Categories List -->
                    <div class="col-md-7">
                        <div class="card card-custom p-4 shadow-sm">
                            <h5 class="fw-bold mb-3">Existing Categories</h5>
                            <div class="table-responsive small">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>ID</th>
                                            <th>Category Name</th>
                                            <th class="text-end">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="cat : ${categories}">
                                            <td th:text="${cat.id}">1</td>
                                            <td class="fw-bold" th:text="${cat.name}">Fruits</td>
                                            <td class="text-end">
                                                <div class="d-flex justify-content-end gap-2">
                                                    <!-- Edit Form Button Trigger -->
                                                    <button type="button" class="btn btn-outline-secondary btn-sm rounded-circle p-2 edit-cat-btn" th:data-id="${cat.id}" th:data-name="${cat.name}" style="width: 32px; height: 32px; line-height: 16px;"><i class="fa-solid fa-pen"></i></button>
                                                    <form action="/admin/categories/delete" method="post" onsubmit="return confirm('Are you sure you want to delete this category?');" class="d-inline">
                                                        <input type="hidden" name="id" th:value="${cat.id}">
                                                        <button type="submit" class="btn btn-outline-danger btn-sm rounded-circle p-2" style="width: 32px; height: 32px; line-height: 16px;"><i class="fa-solid fa-trash"></i></button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Add / Edit Form -->
                    <div class="col-md-5">
                        <!-- Add Category Card -->
                        <div class="card card-custom p-4 shadow-sm mb-4" id="add-card">
                            <h5 class="fw-bold mb-3"><i class="fa-solid fa-plus text-primary me-2"></i>Add Category</h5>
                            <form th:action="@{/admin/categories}" method="post">
                                <div class="mb-3">
                                    <label for="categoryname" class="form-label small fw-semibold">Category Name*</label>
                                    <input type="text" class="form-control rounded-3" id="categoryname" name="categoryname" placeholder="Enter category name" required>
                                </div>
                                <button type="submit" class="btn btn-gradient-primary rounded-pill px-4 py-2 w-100">Create Category</button>
                            </form>
                        </div>

                        <!-- Edit Category Card (Initially Hidden) -->
                        <div class="card card-custom p-4 shadow-sm mb-4 d-none" id="edit-card">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold mb-0"><i class="fa-solid fa-pen text-primary me-2"></i>Edit Category</h5>
                                <button type="button" class="btn-close" id="cancel-edit"></button>
                            </div>
                            <form th:action="@{/admin/categories/update}" method="post">
                                <input type="hidden" id="edit-categoryid" name="categoryid">
                                <div class="mb-3">
                                    <label for="edit-categoryname" class="form-label small fw-semibold">Category Name*</label>
                                    <input type="text" class="form-control rounded-3" id="edit-categoryname" name="categoryname" required>
                                </div>
                                <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 w-100">Save Changes</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>

    <script>
        // Interactive Edit Card reveal
        const editCatBtns = document.querySelectorAll('.edit-cat-btn');
        const addCard = document.getElementById('add-card');
        const editCard = document.getElementById('edit-card');
        const editId = document.getElementById('edit-categoryid');
        const editName = document.getElementById('edit-categoryname');
        const cancelEdit = document.getElementById('cancel-edit');

        editCatBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.getAttribute('data-id');
                const name = this.getAttribute('data-name');
                
                editId.value = id;
                editName.value = name;
                
                addCard.classList.add('d-none');
                editCard.classList.remove('d-none');
            });
        });

        cancelEdit.addEventListener('click', function() {
            editCard.classList.add('d-none');
            addCard.classList.remove('d-none');
        });
    </script>
</body>
</html>
