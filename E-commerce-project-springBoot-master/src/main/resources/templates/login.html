<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta th:replace="~{layout :: head('Login | FreshCart E-Commerce')}">
</head>
<body class="d-flex flex-column min-vh-100">
    <header th:replace="~{layout :: header}"></header>

    <main class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card card-custom p-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-cart-shopping text-primary fs-1 mb-2"></i>
                        <h4 class="fw-bold">Welcome Back</h4>
                        <p class="text-secondary small">Log in to manage your orders and cart.</p>
                    </div>

                    <!-- Error Alert -->
                    <div class="alert alert-danger border-0 rounded-3 small py-2 text-center" th:if="${param.error}">
                        Invalid username or password. Please try again.
                    </div>

                    <form th:action="@{/userloginvalidate}" method="post">
                        <!-- Username -->
                        <div class="form-group mb-3">
                            <label for="username" class="form-label small fw-semibold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="fa-solid fa-user"></i></span>
                                <input type="text" name="username" id="username" class="form-control border-start-0 ps-0 bg-light" placeholder="Enter username" required>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="form-group mb-3">
                            <label for="password" class="form-label small fw-semibold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-secondary"><i class="fa-solid fa-lock"></i></span>
                                <input type="password" name="password" id="password" class="form-control border-start-0 ps-0 bg-light" placeholder="Enter password" required>
                            </div>
                        </div>

                        <!-- Remember Me & Forgot Password -->
                        <div class="d-flex justify-content-between align-items-center mb-4 small">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me">
                                <label class="form-check-label text-secondary" for="remember-me">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none">Forgot Password?</a>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-gradient-primary w-100 rounded-pill py-2.5 mb-3">
                            Log In
                        </button>
                    </form>

                    <div class="text-center small text-secondary mt-2">
                        Don't have an account? <a href="/register" class="text-primary text-decoration-none fw-semibold">Register here</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout :: footer}"></footer>
    <div th:replace="~{layout :: scripts}"></div>
</body>
</html>
